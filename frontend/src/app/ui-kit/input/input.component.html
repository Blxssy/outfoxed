<div [class]="wrapperClasses()">
    @if (label()) {
        <label for="" class="inp__label">{{ label() }}</label>
    }
    <div class="inp__field-wrap">
        <input
            [type]="type()"
            [class]="inputClasses()"
            [placeholder]="placeholder()"
            [disabled]="disabled()"
            [type]="resolvedType()"
        />

        @if (type() === "password") {
            <button
                type="button"
                class="inp__affix inp__affix--right inp__eye-toggle"
                (click)="togglePassword()"
            >
                {{ !passwordVisible() ? "O" : "X" }}
            </button>
        }
    </div>
</div>
